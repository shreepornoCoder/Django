{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<h1 class="text-center">Add Post</h1>

<div style="width: 50%; margin: auto;">
    <form method="post">
        {% csrf_token %}
        {{forms | crispy}}
        <button type="submit" class="btn btn-warning mb-3">Submit</button>
    </form>
</div>

{% endblock  %}
